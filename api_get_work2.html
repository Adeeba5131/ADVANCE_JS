<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API get</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>
<div class="container mt-3">
    <h2>My Photos</h2>
    <div class="row justify-content-center" id="data">
        <div class="mt-5 spinner-border text-danger" id="spinner"></div>
    </div>
</div>   
</body>
</html>

<script>
    fetch('https://jsonplaceholder.typicode.com/photos')
    .then((res) =>res.json())
    .then(data=> 
    
        showData(data.slice(0,20)));
    document.getElementById('spinner').style.diaplay = "none";


    function showData(myobj){
        var div= document.getElementById('data');

        for(data of myobj)
        {

            var html = `
            <div class="col-md-3">
                <div class="card" style="width:100%">
                    <img class="card-img-top" src='${data.url}' style= "width:100%; height:250px">


                    <div class="card-body">
                        <h4 class="card-title">${data.id}</h4>
                        <p class="card-text" >${data.title}</p>
                        <a href="#" class="btn btn=primary">See profile
                            </a>
                        </div>
                    </div>
            </div>`;

            div.insertAdjacentHTML('beforeend', html);
        }
    }

</script>
