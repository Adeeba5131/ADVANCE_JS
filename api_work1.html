<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Work</title>
</head>
<body>
    <table id="table" border="1" >
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Price</th>
        </tr>
    </table>

    <script>
        fetch("https://fakestoreapi.com/products")
        .then( res => res.json())
        .then(obj => fetchdata(obj));

        function fetchdata(myobj){ 

            var table = document.getElementById('table');
            for(data of myobj)
        {
            var html = `
            <tr>
                <td>${data.id}</td>
                <td>${data.title}</td>
                <td>${data.price}</td>
                </tr>`
                table.insertAdjacentHTML('beforeend',html);
        }
         }
    </script>
</body>
</html>
